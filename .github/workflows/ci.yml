name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Install docker-compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version

      - name: Build backend Docker image
        run: docker build -t taskapp-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t taskapp-frontend .

      - name: Run docker-compose
        run: |
          docker-compose up -d
          sleep 15

      - name: Check backend is running
        run: curl -f http://localhost:5000 || echo "Backend check done"

      - name: Check frontend is running
        run: curl -f http://localhost:5173 || echo "Frontend check done"

      - name: Shutdown containers
        run: docker-compose down
